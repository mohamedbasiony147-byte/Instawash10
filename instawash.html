  <script>

var IW_SYNC_KEYS=["orders","customers","inventory","expenses","services","business","carSizes","workers","qualityStatuses","users","auditLog"];
var IW_TIMER=null,IW_SAVING=false;
function iwUrl(){return localStorage.getItem("iw_fb_url")||"";}
function iwBadge(t,c){var e=document.getElementById("iw-fbadge");if(!e){e=document.createElement("div");e.id="iw-fbadge";e.style.cssText="position:fixed;bottom:12px;left:12px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:5px 12px;font-size:11px;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.1);font-family:Cairo,sans-serif;direction:rtl";document.body.appendChild(e);}e.textContent=t;e.style.color=c||"#64748b";}
async function iwPull(){
  iwBadge("⬇️ جاري التحميل من Firebase...","#3B82F6");
  var r=await fetch(iwUrl()+"/instawash.json");
  if(!r.ok)throw new Error(r.status);
  var data=await r.json();
  if(!data){iwBadge("☁️ قاعدة بيانات جديدة","#10B981");return;}
  IW_SYNC_KEYS.forEach(function(k){if(data[k]!=null)localStorage.setItem("iw_"+k,JSON.stringify(data[k]));});
  iwBadge("✅ تم التحميل من Firebase","#10B981");
}
async function iwPush(){
  if(IW_SAVING||!iwUrl())return;IW_SAVING=true;
  iwBadge("⬆️ جاري الحفظ...","#F59E0B");
  try{
    var payload={_at:new Date().toISOString()};
    IW_SYNC_KEYS.forEach(function(k){var v=localStorage.getItem("iw_"+k);payload[k]=v?JSON.parse(v):null;});
    var r=await fetch(iwUrl()+"/instawash.json",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    if(!r.ok)throw new Error(r.status);
    var t=new Date().toLocaleTimeString("ar-EG",{hour:"2-digit",minute:"2-digit"});
    iwBadge("✅ محفوظ "+t,"#10B981");
  }catch(e){iwBadge("❌ خطأ في الحفظ","#EF4444");}
  IW_SAVING=false;
}
function iwStartSync(){if(IW_TIMER)clearInterval(IW_TIMER);IW_TIMER=setInterval(iwPush,60000);window.addEventListener("beforeunload",iwPush);}
window.manualSave=function(){iwPush();};

function iwShowSetup(){
  var d=document.createElement("div");
  d.id="iw-fb-setup";
  d.style.cssText="position:fixed;inset:0;background:linear-gradient(135deg,#0D1B35,#1a3a6e);display:flex;align-items:center;justify-content:center;z-index:99999;padding:20px;font-family:Cairo,sans-serif";
  d.innerHTML='<div style="background:#fff;border-radius:20px;padding:28px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center"><div style="font-size:48px;margin-bottom:12px">💧</div><h2 style="margin:0 0 8px;font-size:18px;font-weight:900;color:#0D1B35;font-family:Cairo,sans-serif">InstaWash</h2><p style="margin:0 0 18px;font-size:12px;color:#64748b;font-family:Cairo,sans-serif">ادخل رابط Firebase لحفظ البيانات على الكلاود</p><div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:11px;color:#166534;text-align:right;line-height:1.9">✅ مجاني 100% بـ Gmail<br>✅ تخزين 1 جيجابايت<br>✅ يعمل من أي جهاز<br>✅ بيانات محمية بنظام المستخدمين</div><input id="iw-url-in" type="url" dir="ltr" placeholder="https://xxx-default-rtdb.firebaseio.com" style="width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid #e2e8f0;font-size:11px;font-family:monospace;box-sizing:border-box;outline:none;margin-bottom:10px"><button onclick="iwConnect()" style="width:100%;padding:12px;border-radius:10px;background:#0D1B35;border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:Cairo,sans-serif;margin-bottom:8px">🚀 اتصال وتشغيل</button><button onclick="iwSkip()" style="width:100%;padding:9px;border-radius:10px;background:none;border:1px solid #e2e8f0;color:#94a3b8;font-size:12px;cursor:pointer;font-family:Cairo,sans-serif">تشغيل بدون كلاود (محلي)</button><p id="iw-st" style="font-size:11px;color:#94a3b8;margin:8px 0 0;min-height:16px"></p></div>';
  document.body.appendChild(d);
}
window.iwConnect=async function(){
  var url=(document.getElementById("iw-url-in").value||"").trim().replace(/\/$/,"");
  var st=document.getElementById("iw-st");
  if(!url.includes("firebaseio.com")){st.textContent="❌ يجب أن ينتهي الرابط بـ .firebaseio.com";st.style.color="#EF4444";return;}
  st.textContent="جاري الاختبار...";st.style.color="#3B82F6";
  try{
    localStorage.setItem("iw_fb_url",url);
    await iwPull();
    document.getElementById("iw-fb-setup").remove();
    iwStartSync();
    location.reload();
  }catch(e){
    st.textContent="❌ "+e.message;st.style.color="#EF4444";
    localStorage.removeItem("iw_fb_url");
  }
};
window.iwSkip=function(){document.getElementById("iw-fb-setup").remove();iwBadge("⚠️ وضع محلي فقط","#F59E0B");};
window.addEventListener("load",async function(){
  var url=iwUrl();
  if(!url){iwShowSetup();return;}
  // Check if this is first load after connecting (data not yet in localStorage)
  var hasData = localStorage.getItem("iw_users");
  try{
    var changed = await iwPull();
    iwStartSync();
    // If first time (no local data), reload to let React pick up fresh data
    if(!hasData){
      setTimeout(function(){ location.reload(); }, 500);
    }
  }
  catch(e){iwBadge("⚠️ لا يوجد اتصال — وضع محلي","#F59E0B");}
});

  </script>
